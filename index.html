<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ቪዲዮ እይና ብር ስራ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        video {
            width: 100%;
            border-radius: 5px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>እንኳን ደህና መጡ!</h2>
        <p>ይህንን አጭር ቪዲዮ እስከመጨረሻው በመመልከት ሽልማትዎን ያግኙ።</p>
        <video id="myVideo" controls>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            የእርስዎ ብሮውዘር ቪዲዮውን አይደግፍም።
        </video>
        <br>
        <button id="rewardBtn" disabled>እባክዎ ቪዲዮውን ይመልከቱ...</button>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const button = document.getElementById('rewardBtn');

        video.onended = function() {
            button.disabled = false;
            button.innerText = "ሽልማትዎን ይቀበሉ 🎁";
            button.style.backgroundColor = "#007bff";
        };

        button.onclick = function() {
            alert("በማየትዎ እናመሰግናለን! ሽልማትዎ ታስቧል።");
        };
    </script>
</body>
</html>
