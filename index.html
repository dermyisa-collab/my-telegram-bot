<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ቪዲዮ አይተው ብር ይስሩ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background-color: #2d2d2d;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 {
            color: #4CAF50;
            margin-bottom: 20px;
        }
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            background-color: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .timer {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff9800;
            margin: 15px 0;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 80%;
            transition: 0.3s;
            display: none;
        }
        .status {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📺 ቪዲዮውን አይተው ብር ያግኙ!</h2>
    <p>ብር ለመቀበል ቪዲዮውን መመልከት ይጀምሩ እና ሰከንዱ እስኪያልቅ ይጠብቁ።</p>
    
    <div class="video-container">
        <iframe id="videoPlayer" src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="timer" id="timerContainer">ቪዲዮውን ሲጀምሩ ሰዓቱ ይቆጥራል</div>
    
    <button class="btn" id="claimBtn" onclick="claimReward()">🎁 ሽልማቴን ተቀበል</button>
    <div class="status" id="statusText">ቪዲዮውን ይመልከቱ...</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let timeLeft = 30;
    let timerId = null;
    let videoWatched = false;

    function startTimer() {
        if (timerId !== null) return;
        
        timerId = setInterval(() => {
            timeLeft--;
            document.getElementById('timerContainer').innerText = `🕒 የቀረው ጊዜ: ${timeLeft} ሰከንድ`;
            
            if (timeLeft <= 0) {
                clearInterval(timerId);
                document.getElementById('timerContainer').innerText = "✅ ቪዲዮው ተጠናቋል!";
                document.getElementById('claimBtn').style.display = "inline-block";
                document.getElementById('statusText').innerText = "አሁን 'ሽልማቴን ተቀበል' የሚለውን ቁልፍ መጫን ይችላሉ!";
                videoWatched = true;
            }
        }, 1000);
    }

    window.onload = function() {
        startTimer();
    };

    function claimReward() {
        if (videoWatched) {
            tg.sendData("VIDEO_WATCHED_SUCCESS");
            tg.close();
        }
    }
</script>

</body>
</html>
